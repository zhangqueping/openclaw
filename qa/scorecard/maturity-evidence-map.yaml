version: 1
id: stable-lts-initial
title: Initial Stable/LTS QA maturity evidence map
sourceRef: taxonomy.yaml
taxonomyRef: taxonomy.yaml
scoreSnapshotRef: docs/maturity-scores.yaml
status: initial
mappingAuthority: scaffold
mappingOwner: "@kevinlin-openai"
reportOnly: true
notes: Executable QA coverage/profile mapping layer over taxonomy.yaml. taxonomy.yaml is
  authoritative for maturity surfaces, categories, and levels; this file only maps existing QA
  coverage IDs and runnable smoke-ci/release profile selectors to those taxonomy categories. It is
  not Kevin's final requirement-to-code-path mapping.
profiles:
  - id: smoke-ci
    description:
      Deterministic PR and merge proof with mock model providers, synthetic qa-channel, and
      local SDK-backed channel upstreams; no live external service required.
    categoryIds:
      - agent-runtime-and-provider-execution.agent-turn-execution
      - session-memory-and-context-engine.token-management
      - browser-automation-and-exec-sandbox-tools.tool-invocation-and-execution
      - security-auth-pairing-and-secrets.approval-policy-and-tool-safeguards
      - telemetry-diagnostics-and-observability.telemetry-export
      - channel-framework.conversation-routing-and-delivery
      - session-memory-and-context-engine.memory
      - session-memory-and-context-engine.diagnostics-maintenance-and-recovery
      - automation-cron-hooks-tasks-polling.cron-jobs
      - plugin-sdk-and-bundled-plugin-architecture.installing-and-running-plugins
      - media-understanding-and-media-generation.media-understanding
      - media-understanding-and-media-generation.media-generation
      - browser-control-ui-and-webchat.browser-ui
      - security-auth-pairing-and-secrets.credential-and-secret-hygiene
  - id: release
    description:
      Stable/LTS proof selector for live providers, live channels, package artifacts, upgrade
      paths, and platform proof where the claim depends on real upstreams or release artifacts.
    categoryIds:
      - agent-runtime-and-provider-execution.agent-turn-execution
      - session-memory-and-context-engine.token-management
      - browser-automation-and-exec-sandbox-tools.tool-invocation-and-execution
      - security-auth-pairing-and-secrets.approval-policy-and-tool-safeguards
      - telemetry-diagnostics-and-observability.telemetry-export
      - openai-codex-provider-path.responses-and-tool-compatibility
      - session-memory-and-context-engine.memory
      - session-memory-and-context-engine.diagnostics-maintenance-and-recovery
      - automation-cron-hooks-tasks-polling.cron-jobs
      - plugin-sdk-and-bundled-plugin-architecture.installing-and-running-plugins
      - media-understanding-and-media-generation.media-understanding
      - media-understanding-and-media-generation.media-generation
      - browser-control-ui-and-webchat.browser-ui
      - security-auth-pairing-and-secrets.credential-and-secret-hygiene
categories:
  - id: agent-runtime-and-provider-execution.agent-turn-execution
    supportStatus: lts-included
    releaseBlocking: true
    requirement:
      A normal user turn streams, calls tools when needed, finishes once, and records visible
      transcript evidence.
    evidenceRequired: Deterministic QA Lab scenarios plus runtime e2e evidence on the target ref.
    evidence:
      profiles:
        - smoke-ci
        - release
      liveProofRequired: false
      freshness: target-ref
      coverageIds:
        - channels.dm
        - channels.streaming
        - runtime.delivery
      scenarioRefs:
        - qa/scenarios/channels/dm-chat-baseline.md
        - qa/scenarios/runtime/streaming-final-integrity.md
      docsRefs:
        - docs/concepts/qa-e2e-automation.md
        - docs/channels/qa-channel.md
      codeRefs:
        - extensions/qa-lab/src/suite.ts
        - extensions/qa-lab/src/suite-runtime-transport.ts
    taxonomySurfaceId: agent-runtime-and-provider-execution
    taxonomyCategoryName: Agent Turn Execution
  - id: session-memory-and-context-engine.token-management
    supportStatus: lts-included
    releaseBlocking: true
    requirement: Long sessions compact or recover without hiding replay-unsafe mutating work.
    evidenceRequired: QA Lab long-context or compaction scenario plus focused runtime e2e proof.
    evidence:
      profiles:
        - smoke-ci
        - release
      liveProofRequired: false
      freshness: target-ref
      coverageIds:
        - runtime.compaction
        - runtime.retry-policy
      scenarioRefs:
        - qa/scenarios/runtime/compaction-retry-mutating-tool.md
      docsRefs:
        - docs/help/testing.md
      codeRefs:
        - extensions/qa-lab/src/suite.ts
        - src/agents/embedded-agent-subscribe.ts
    taxonomySurfaceId: session-memory-and-context-engine
    taxonomyCategoryName: Token Management
  - id: browser-automation-and-exec-sandbox-tools.tool-invocation-and-execution
    supportStatus: lts-included
    releaseBlocking: true
    requirement: File, shell, patch, search, and session tools execute through production tool paths
      with correct result rendering.
    evidenceRequired: Runtime tool fixture scenarios plus host e2e shard.
    evidence:
      profiles:
        - smoke-ci
        - release
      liveProofRequired: false
      freshness: target-ref
      coverageIds:
        - tools.apply-patch
        - tools.exec
        - tools.fs.read
        - tools.fs.write
        - tools.web-search
      scenarioRefs:
        - qa/scenarios/runtime/tools/apply-patch.md
        - qa/scenarios/runtime/tools/exec.md
        - qa/scenarios/runtime/tools/fs-read.md
        - qa/scenarios/runtime/tools/fs-write.md
        - qa/scenarios/runtime/tools/web-search.md
      docsRefs:
        - qa/scenarios/index.md
      codeRefs:
        - extensions/qa-lab/src/runtime-tool-fixture.ts
    taxonomySurfaceId: browser-automation-and-exec-sandbox-tools
    taxonomyCategoryName: Tool Invocation and Execution
  - id: security-auth-pairing-and-secrets.approval-policy-and-tool-safeguards
    supportStatus: lts-included
    releaseBlocking: true
    requirement: Approval, denial, retry, and terminal stop paths work through portable actions.
    evidenceRequired: QA Lab approval scenarios plus channel action evidence where a channel claim exists.
    evidence:
      profiles:
        - smoke-ci
        - release
      liveProofRequired: false
      freshness: target-ref-and-release-package
      coverageIds:
        - runtime.approvals
        - tools.followthrough
        - personal.approval-denial
      scenarioRefs:
        - qa/scenarios/runtime/approval-turn-tool-followthrough.md
        - qa/scenarios/personal/approval-denial-stop.md
      docsRefs:
