        - docs/channels/qa-channel.md
      codeRefs:
        - extensions/qa-lab/src/suite.ts
        - src/agents/embedded-agent-runner/run/incomplete-turn.ts
    taxonomySurfaceId: security-auth-pairing-and-secrets
    taxonomyCategoryName: Approval Policy and Tool Safeguards
  - id: telemetry-diagnostics-and-observability.telemetry-export
    supportStatus: deferred
    releaseBlocking: false
    requirement:
      User-visible runs emit bounded trace/run diagnostics with enough IDs to debug release
      failures without leaking secrets.
    evidenceRequired:
      QA Lab telemetry scenario plus OTEL or Prometheus smoke; deferred because the LTS
      proposal includes health/logging/session diagnostics first and leaves telemetry export
      hardening for later.
    evidence:
      profiles:
        - smoke-ci
        - release
      liveProofRequired: false
      freshness: target-ref
      coverageIds:
